<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieNeek</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white overflow-x-hidden">

  <!-- BACKGROUND (DOUBLE LAYER FOR FADE) -->
  <div class="fixed inset-0 -z-10">
    <div id="bg1" class="absolute inset-0 bg-center bg-cover transition-opacity duration-1000"></div>
    <div id="bg2" class="absolute inset-0 bg-center bg-cover opacity-0 transition-opacity duration-1000"></div>
    <div class="absolute inset-0 bg-black/80"></div>
  </div>

  <!-- HERO -->
  <section class="h-screen flex flex-col justify-center px-6 md:px-20">
    
    <h1 id="title" class="text-4xl md:text-6xl font-light mb-6">
      Loading...
    </h1>

    <p id="overview" class="max-w-xl text-gray-400 mb-8">
      Please wait
    </p>

    <a id="watchBtn" href="#"
      class="border border-white px-6 py-2 rounded-lg hover:bg-white hover:text-black transition w-fit">
      Watch Now
    </a>

  </section>

  <!-- SECTIONS -->
  <div class="space-y-10 px-6 md:px-20 pb-20">

    <div>
      <h2 class="mb-4 text-sm text-gray-400">Trending</h2>
      <div id="trending" class="flex gap-4 overflow-x-auto snap-x snap-mandatory no-scrollbar"></div>
    </div>

    <div>
      <h2 class="mb-4 text-sm text-gray-400">Popular Movies</h2>
      <div id="popular" class="flex gap-4 overflow-x-auto snap-x snap-mandatory no-scrollbar"></div>
    </div>

    <div>
      <h2 class="mb-4 text-sm text-gray-400">Top Rated</h2>
      <div id="toprated" class="flex gap-4 overflow-x-auto snap-x snap-mandatory no-scrollbar"></div>
    </div>

    <div>
      <h2 class="mb-4 text-sm text-gray-400">TV Shows</h2>
      <div id="tv" class="flex gap-4 overflow-x-auto snap-x snap-mandatory no-scrollbar"></div>
    </div>

  </div>

  <!-- SCROLLBAR HIDE -->
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <script>
    const API_KEY = "e3afd4c89e3351edad9e875ff7a01f0c";
    const IMG = "https://image.tmdb.org/t/p/original";
    const POSTER = "https://image.tmdb.org/t/p/w500";
    const FALLBACK = "https://raw.githubusercontent.com/animeneek/movieneek/main/assets/images/BG_01.jpg";

    let heroList = [];
    let heroIndex = 0;
    let currentBG = 1;

    async function fetchData(url) {
      const res = await fetch(url);
      const data = await res.json();
      return data.results;
    }

    function getImage(path, type="bg") {
      if (!path) return FALLBACK;
      return (type === "bg" ? IMG : POSTER) + path;
    }

    function preloadImage(src) {
      const img = new Image();
      img.src = src;
    }

    function setHero(item) {
      const title = item.title || item.name;
      const overview = item.overview || "No description available";

      document.getElementById("title").textContent = title;
      document.getElementById("overview").textContent = overview;

      const bgUrl = getImage(item.backdrop_path);

      preloadImage(bgUrl);

      const bg1 = document.getElementById("bg1");
      const bg2 = document.getElementById("bg2");

      if (currentBG === 1) {
        bg2.style.backgroundImage = `url(${bgUrl})`;
        bg2.style.opacity = "1";
        bg1.style.opacity = "0";
        currentBG = 2;
      } else {
        bg1.style.backgroundImage = `url(${bgUrl})`;
        bg1.style.opacity = "1";
        bg2.style.opacity = "0";
        currentBG = 1;
      }

      const type = item.media_type === "tv" ? "series" : "movie";
      document.getElementById("watchBtn").href = `/${type}.html?id=${item.id}`;
    }

    function startHeroRotation() {
      setHero(heroList[0]);

      setInterval(() => {
        heroIndex = (heroIndex + 1) % heroList.length;
        setHero(heroList[heroIndex]);
      }, 12000);
    }

    function createCard(item) {
      const title = item.title || item.name;
      const type = item.media_type === "tv" || item.first_air_date ? "series" : "movie";

      const link = document.createElement("a");
      link.href = `/${type}.html?id=${item.id}`;
      link.className = "min-w-[140px] snap-start";

      link.innerHTML = `
        <div class="relative rounded-lg overflow-hidden border border-white/10 hover:scale-105 transition duration-300">
          
          <img 
            src="${getImage(item.poster_path, "poster")}" 
            class="w-full h-[210px] object-cover"
          />

          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-2">
            <p class="text-xs">${title}</p>
          </div>

        </div>
      `;

      return link;
    }

    function renderRow(id, data) {
      const container = document.getElementById(id);
      container.innerHTML = "";

      data.forEach(item => {
        container.appendChild(createCard(item));
      });
    }

    async function init() {
      const trending = await fetchData(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
      const popular = await fetchData(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
      const topRated = await fetchData(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`);
      const tv = await fetchData(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`);

      heroList = trending.slice(0, 10);

      startHeroRotation();

      renderRow("trending", trending);
      renderRow("popular", popular);
      renderRow("toprated", topRated);
      renderRow("tv", tv);
    }

    init();
  </script>

</body>
</html>
