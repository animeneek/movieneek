<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieNeek</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- HERO -->
  <section id="hero"
    class="relative h-[90vh] flex items-center px-6 md:px-12 bg-cover bg-center"
    style="background-image: url('assets/images/Prabhas_01.jpg');">

    <div class="absolute inset-0 bg-black/70"></div>

    <div class="relative z-10 max-w-2xl">
      <h1 id="hero-title" class="text-4xl md:text-6xl font-bold mb-4">
        Loading...
      </h1>

      <p id="hero-overview" class="text-gray-300 mb-6">
        Loading movies...
      </p>

      <a id="watch-btn"
         href="#"
         class="bg-red-500 px-6 py-3 rounded-full font-semibold hover:bg-red-600 transition">
        ▶ Watch Now
      </a>
    </div>
  </section>

  <!-- MOVIES -->
  <section class="px-6 md:px-12 py-10">
    <h2 class="text-2xl font-semibold mb-6">Trending Movies</h2>

    <div id="movie-row" class="flex gap-4 overflow-x-auto">
    </div>
  </section>

  <script src="assets/js/header.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
