<header class="w-full absolute top-0 left-0 z-50">
  <div class="flex items-center justify-between px-6 md:px-12 py-4">

    <!-- Logo -->
    <div class="text-white text-2xl font-bold">
      Movie<span class="text-red-500">Neek</span>
    </div>

    <!-- Right -->
    <div class="flex items-center gap-4">

      <!-- Desktop Search -->
      <div class="hidden md:flex bg-white/10 px-3 py-1 rounded-full">
        <input 
          type="text" 
          placeholder="Search..."
          class="bg-transparent outline-none text-white text-sm"
        />
      </div>

      <!-- Mobile Button -->
      <button id="menuBtn" class="md:hidden text-2xl">
        ☰
      </button>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden bg-black/95 px-6 py-4">
    <input 
      type="text"
      placeholder="Search..."
      class="w-full bg-white/10 px-3 py-2 rounded outline-none"
    />
  </div>
</header>
