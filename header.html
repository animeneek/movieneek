<header class="w-full absolute top-0 left-0 z-50">
  <div class="flex items-center justify-between px-6 md:px-12 py-4">

    <!-- Logo -->
    <div class="text-white text-2xl font-bold tracking-wide">
      Movie<span class="text-red-500">Neek</span>
    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4">

      <!-- Search -->
      <div class="hidden md:flex items-center bg-white/10 backdrop-blur-md px-3 py-1 rounded-full">
        <input 
          type="text" 
          placeholder="Search movies..." 
          class="bg-transparent outline-none text-white text-sm placeholder-gray-300 w-40"
        />
      </div>

      <!-- Mobile Menu Button -->
      <button id="menuBtn" class="md:hidden text-white text-2xl">
        ☰
      </button>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden flex-col bg-black/95 text-white px-6 py-4 space-y-4 md:hidden">
    
    <!-- Mobile Search -->
    <input 
      type="text" 
      placeholder="Search movies..." 
      class="w-full bg-white/10 px-3 py-2 rounded outline-none"
    />

  </div>
</header>
