<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieNeek</title>
  <script src="https://cdn.tailwindcss.com"></script>

<!--popupblocker--
  <script>
(function() {
  const originalOpen = window.open;

  window.open = function(url, name, specs) {
    // Allow only your domain
    const allowedDomain = location.origin;

    if (!url || url.startsWith(allowedDomain)) {
      return originalOpen.apply(window, arguments);
    }

    console.log("Blocked popup:", url);
    return null;
  };
})();
</script>

<script>
(function() {
  let lastUrl = location.href;

  setInterval(() => {
    if (location.href !== lastUrl) {
      const allowedDomain = location.origin;

      if (!location.href.startsWith(allowedDomain)) {
        console.log("Blocked redirect:", location.href);
        location.href = lastUrl;
      } else {
        lastUrl = location.href;
      }
    }
  }, 500);
})();
</script>

<div class="relative w-full h-full">
  <iframe id="playerFrame"
    class="absolute top-0 left-0 w-full h-full"
    allow="autoplay; fullscreen"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <div id="clickShield"
       class="absolute inset-0 z-10 cursor-pointer"></div>
</div>

<script>
const shield = document.getElementById("clickShield");
const iframe = document.getElementById("playerFrame");

shield.addEventListener("click", () => {
  // Allow interaction temporarily
  shield.style.display = "none";

  setTimeout(() => {
    shield.style.display = "block";
  }, 3000); // re-block after 3s
});
</script>

<script>
document.addEventListener("click", function(e) {
  let target = e.target.closest("a");

  if (target && target.href) {
    if (!target.href.startsWith(location.origin)) {
      e.preventDefault();
      console.log("Blocked external link:", target.href);
    }
  }
}, true);
</script>

<!--popupbloker end-->

  
</head>

<body class="bg-black text-white overflow-x-hidden">

  <!-- BACKGROUND -->
  <div class="fixed inset-0 -z-10">
    <div id="bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700"></div>
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
  </div>

  <!-- HERO -->
  <section class="min-h-[70vh] flex flex-col justify-end px-6 md:px-20 pt-24 pb-10 space-y-3">
    <div class="max-w-2xl">
      <h1 id="title" class="text-4xl md:text-6xl font-light leading-tight max-w-xl"></h1>
      <p id="meta" class="text-sm text-gray-400"></p>
      <p id="overview" class="text-gray-400 mt-3 max-w-xl leading-relaxed"></p>
      <p id="rating" class="text-gray-300 mt-2"></p>
    </div>
  </section>

  <!-- EMBED PLAYER -->
  <section class="px-6 md:px-20 pb-16 -mt-6">
    <!-- softer label instead of loud "Watch" -->
    <h2 class="text-xs text-gray-500 mb-3 text-center tracking-widest uppercase">Now Playing</h2>

    <div class="w-full max-w-[95vw] xl:max-w-[1400px] mx-auto rounded-xl overflow-hidden relative">

      <!-- cinema glow -->
      <div class="absolute inset-0 bg-gradient-to-b from-black via-transparent to-black opacity-80 pointer-events-none"></div>

      <div class="relative w-full rounded-xl overflow-hidden border border-white/10 bg-black shadow-[0_0_120px_rgba(0,0,0,0.9)]">
        <div class="relative w-full aspect-video md:aspect-[16/9] lg:aspect-[21/9]">
          <iframe id="playerFrame"
  allow="autoplay; fullscreen"
            class="absolute top-0 left-0 w-full h-full"
            frameborder="0"
            allowfullscreen>
          </iframe>

        </div>
      </div>

    </div>
  </section>

  <!-- CAST -->
  <section class="px-6 md:px-20 pb-10">
    <h2 class="text-sm text-gray-400 mb-4 text-center">Cast</h2>
    <div id="cast" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </section>

  <!-- CREW -->
  <section class="px-6 md:px-20 pb-10">
    <h2 class="text-sm text-gray-400 mb-4 text-center">Crew</h2>
    <div id="crew" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </section>

  <!-- REVIEWS -->
  <section class="px-6 md:px-20 pb-10">
    <h2 class="text-sm text-gray-400 mb-4 text-center">Reviews</h2>
    <div id="reviews" class="space-y-4"></div>
  </section>

  <!-- RECOMMEND -->
  <section class="px-6 md:px-20 pb-20">
    <h2 class="text-sm text-gray-400 mb-4">Recommended</h2>
    <div id="recommend" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
  </section>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }
  </style>

  <script>
    const API_KEY = "e3afd4c89e3351edad9e875ff7a01f0c";
    const IMG = "https://image.tmdb.org/t/p/original";
    const POSTER = "https://image.tmdb.org/t/p/w500";

    // ✅ FIXED fallback (local path instead of broken GitHub blob)
    const FALLBACK = "/movieneek/assets/images/BG_01.jpg";

    const id = new URLSearchParams(window.location.search).get("id");

    function getImage(path, type="bg") {
      if (!path) return FALLBACK;
      return (type === "bg" ? IMG : POSTER) + path;
    }

    function createCard(item) {
      const link = document.createElement("a");
      link.href = `/movieneek/movie.html?id=${item.id}`;
      link.className = "min-w-[140px]";
      link.innerHTML = `
        <div class="relative rounded-lg overflow-hidden border border-white/10 hover:scale-105 transition duration-300">
          <img src="${getImage(item.poster_path, "poster")}" class="w-full h-[210px] object-cover"/>
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-2 text-xs">
            ${item.title}
          </div>
        </div>`;
      return link;
    }

    async function loadMovie() {
      const [movie, credits, rec, reviewsData] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.themoviedb.org/3/movie/${id}/reviews?api_key=${API_KEY}`).then(r => r.json())
      ]);

      // HERO
      document.getElementById("title").textContent = movie.title;
      document.getElementById("overview").textContent = movie.overview;

      const genres = movie.genres.map(g => g.name).slice(0,2).join(", ");
      document.getElementById("meta").textContent = `Movie / ${genres}`;

      // ✅ FIXED background (fallback if no backdrop)
      const bgImage = movie.backdrop_path
  ? IMG + movie.backdrop_path
  : (movie.poster_path ? POSTER + movie.poster_path : FALLBACK);

const bgEl = document.getElementById("bg");
bgEl.style.backgroundImage = `url(${bgImage})`;
bgEl.style.backgroundSize = "cover";
bgEl.style.backgroundPosition = "center";
bgEl.style.backgroundRepeat = "no-repeat";

      //document.getElementById("bg").style.backgroundImage = `url(${bgImage})`;

      document.getElementById("rating").textContent =
        `Rating: ${movie.vote_average} / 10 (${movie.vote_count} votes)`;

      // EMBED PLAYER
      document.getElementById("playerFrame").src =
        `https://player.embed-api.stream/?id=${movie.id}`;

      // CAST
      const castContainer = document.getElementById("cast");
      credits.cast.slice(0,12).forEach(p => {
        const div = document.createElement("a");
        div.href = `/movieneek/person.html?id=${p.id}`;
        div.className = "flex gap-3 items-center";

        div.innerHTML = `
          <img src="${getImage(p.profile_path, 'poster')}" class="w-12 h-12 rounded-full object-cover"/>
          <div class="text-left">
            <p class="text-sm">${p.character || ''}</p>
            <p class="text-xs text-gray-400">${p.name}</p>
          </div>`;
        castContainer.appendChild(div);
      });

      // CREW
      const crewContainer = document.getElementById("crew");
      credits.crew.filter(p => ["Director","Writer"].includes(p.job)).forEach(p => {
        const div = document.createElement("a");
        div.href = `/movieneek/person.html?id=${p.id}`;
        div.className = "flex gap-3 items-center";

        div.innerHTML = `
          <img src="${getImage(p.profile_path, 'poster')}" class="w-12 h-12 rounded-full object-cover"/>
          <div class="text-left">
            <p class="text-sm">${p.job}</p>
            <p class="text-xs text-gray-400">${p.name}</p>
          </div>`;
        crewContainer.appendChild(div);
      });

      // REVIEWS
      const reviewsContainer = document.getElementById("reviews");
      reviewsData.results.slice(0,5).forEach(r => {
        const div = document.createElement("div");
        div.className = "bg-white/10 p-3 rounded-md";
        div.innerHTML = `
          <p class="text-xs text-gray-400 mb-1">${r.author}</p>
          <p class="text-sm">${r.content.length > 150 ? r.content.slice(0,150)+'...' : r.content}</p>`;
        reviewsContainer.appendChild(div);
      });

      // RECOMMEND
      const recContainer = document.getElementById("recommend");
      rec.results.slice(0,10).forEach(m => recContainer.appendChild(createCard(m)));
    }

    loadMovie();
  </script>

</body>
</html>
