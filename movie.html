<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieNeek</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white overflow-x-hidden">

  <!-- BACKGROUND -->
  <div class="fixed inset-0 -z-10">
    <div id="bg" class="absolute inset-0 bg-cover bg-center"></div>
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
  </div>

  <!-- HERO -->
  <section class="min-h-screen flex items-center px-6 md:px-20">
    <div class="max-w-2xl space-y-4">

      <h1 id="title" class="text-4xl md:text-6xl font-light"></h1>

      <p id="meta" class="text-sm text-gray-400"></p>

      <p id="overview" class="text-gray-400"></p>

      <button onclick="openPlayer()"
        class="border border-white px-6 py-2 rounded-lg hover:bg-white hover:text-black transition">
        Play
      </button>

    </div>
  </section>

  <!-- CAST -->
  <section class="px-6 md:px-20 pb-10">
    <h2 class="text-sm text-gray-400 mb-4">Cast</h2>
    <div id="cast" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
  </section>

  <!-- CREW -->
  <section class="px-6 md:px-20 pb-10">
    <h2 class="text-sm text-gray-400 mb-4">Crew</h2>
    <div id="crew" class="text-sm text-gray-300 space-y-1"></div>
  </section>

  <!-- RECOMMEND -->
  <section class="px-6 md:px-20 pb-20">
    <h2 class="text-sm text-gray-400 mb-4">Recommended</h2>
    <div id="recommend" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
  </section>

  <!-- PLAYER -->
  <div id="playerModal"
    class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

    <div class="w-full max-w-5xl aspect-video relative">
      <iframe id="playerFrame"
        class="w-full h-full rounded-lg"
        frameborder="0"
        allowfullscreen>
      </iframe>

      <button onclick="closePlayer()" class="absolute -top-10 right-0 text-sm">
        Close
      </button>
    </div>

  </div>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }
  </style>

  <script>
    const API_KEY = "e3afd4c89e3351edad9e875ff7a01f0c";
    const IMG = "https://image.tmdb.org/t/p/original";
    const POSTER = "https://image.tmdb.org/t/p/w500";
    const FALLBACK = "https://raw.githubusercontent.com/animeneek/movieneek/main/assets/images/BG_01.jpg";

    const id = new URLSearchParams(window.location.search).get("id");

    function getImage(path, type="bg") {
      if (!path) return FALLBACK;
      return (type === "bg" ? IMG : POSTER) + path;
    }

    function openPlayer() {
      document.getElementById("playerModal").classList.remove("hidden");
      document.getElementById("playerModal").classList.add("flex");
      document.getElementById("playerFrame").src =
        `https://player.embed-api.stream/?id=${id}`;
    }

    function closePlayer() {
      document.getElementById("playerModal").classList.add("hidden");
      document.getElementById("playerFrame").src = "";
    }

    function createCard(item) {
      const link = document.createElement("a");
      link.href = `/movie.html?id=${item.id}`;
      link.className = "min-w-[140px]";

      link.innerHTML = `
        <div class="relative rounded-lg overflow-hidden border border-white/10">
          <img src="${getImage(item.poster_path, "poster")}" class="w-full h-[210px] object-cover"/>
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-2 text-xs">
            ${item.title}
          </div>
        </div>
      `;
      return link;
    }

    async function loadMovie() {
      const [movie, credits, rec] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`).then(r => r.json())
      ]);

      document.getElementById("title").textContent = movie.title;
      document.getElementById("overview").textContent = movie.overview;

      const genres = movie.genres.map(g => g.name).slice(0,2).join(", ");
      document.getElementById("meta").textContent = `Movie / ${genres}`;

      document.getElementById("bg").style.backgroundImage =
        `url(${getImage(movie.backdrop_path)})`;

      // CAST
      const castContainer = document.getElementById("cast");
      credits.cast.slice(0,10).forEach(p => {
        const div = document.createElement("a");
        div.href = `/person.html?id=${p.id}`;
        div.className = "min-w-[100px] text-xs";

        div.innerHTML = `
          <img src="${getImage(p.profile_path, "poster")}" 
               class="w-full h-[140px] object-cover rounded-lg mb-1"/>
          <p>${p.name}</p>
        `;
        castContainer.appendChild(div);
      });

      // CREW
      const crew = credits.crew;
      const director = crew.find(p => p.job === "Director");
      const writer = crew.find(p => p.job === "Writer");

      document.getElementById("crew").innerHTML = `
        <p>Director: ${director ? director.name : "N/A"}</p>
        <p>Writer: ${writer ? writer.name : "N/A"}</p>
      `;

      // RECOMMEND
      const recContainer = document.getElementById("recommend");
      rec.results.slice(0,10).forEach(m => {
        recContainer.appendChild(createCard(m));
      });
    }

    loadMovie();
  </script>

</body>
</html>
